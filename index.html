<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>System RPG v19</title>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    /* --- 1. ZÁKLAD (Kompaktní design) --- */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #F0EEF8; font-family: -apple-system, system-ui, sans-serif; color: #1F2937; overflow-x: hidden; }
    .phone { max-width: 450px; width: 100%; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 110px; }

    /* --- 2. ANIMACE --- */
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    @keyframes victoryJump { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2) translateY(-10px); } }
    @keyframes pulseGold { 0% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0); } }

    /* --- 3. UI PRVKY (ROUTINE & SYSTEM) - Stejné jako V18 --- */
    .header { text-align: center; padding: 20px 20px 10px; position: relative; }
    h1 { font-size: 22px; font-weight: 800; }
    .date-label { font-size: 13px; color: #6B7280; font-weight: 600; margin-top: 2px; }
    .counter-badge { position: absolute; right: 20px; top: 22px; background: white; border-radius: 20px; padding: 5px 12px; font-size: 13px; font-weight: 800; border: 1px solid #D1D5DB; display: flex; align-items: center; gap: 5px; transition: all 0.3s ease; }
    .counter-badge.all-done { background: #10B981; color: white; border-color: #10B981; animation: pop 0.4s ease; }

    .calendar { display: flex; justify-content: space-between; padding: 12px 16px; gap: 6px; }
    .cal-day { flex: 1; text-align: center; cursor: pointer; border-radius: 12px; padding: 8px 2px; border: 1px solid #D1D5DB; background: white; transition: all 0.2s; }
    .cal-day.active { border-color: #7C3AED; background: #EDE9FE; transform: translateY(-2px); }
    .cal-day .day-num { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto; font-size: 14px; font-weight: 800; }
    .cal-day.active .day-num { background: #7C3AED; color: white; }

    .progress-card { background: white; margin: 10px 16px 20px; border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; border: 1px solid #D1D5DB; animation: slideUp 0.5s ease; }
    .ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
    .ring-wrap svg { transform: rotate(-90deg); width: 72px; height: 72px; }
    .ring-bg { fill: none; stroke: #F3F4F6; stroke-width: 7; }
    .ring-fg { fill: none; stroke: #7C3AED; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
    .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #000; }
    .progress-text h2 { font-size: 16px; font-weight: 800; }
    .progress-text p { font-size: 12px; color: #6B7280; font-weight: 500; }

    .tasks { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
    .task { border-radius: 18px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid #D1D5DB; background: white; transition: all 0.3s; animation: slideUp 0.4s forwards; }
    .task.priority-high { border-left: 6px solid #EF4444; background: #FEF2F2; }
    .task.priority-mid { border-left: 6px solid #F59E0B; background: #FFFBEB; }
    .task.priority-low { border-left: 6px solid #10B981; background: #ECFDF5; }
    .task.done { opacity: 0.5; transform: scale(0.97); filter: grayscale(0.2); background: #F9FAFB; border-left-color: #D1D5DB; }

    .task-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #7C3AED; display: grid; place-items: center; cursor: pointer; background: white; flex-shrink: 0; }
    .task.done .task-check { background: #7C3AED; }
    .task-check svg { width: 14px; height: 14px; stroke: white; stroke-width: 4; fill: none; display: none; }
    .task.done .task-check svg { display: block; }
    .task-info { flex: 1; min-width: 0; }
    .task-name { font-size: 14px; font-weight: 700; color: #111827; }
    .task.done .task-name { text-decoration: line-through; color: #9CA3AF; }

    /* --- 4. 🔥 JOURNEY & GAME PATH 🔥 --- */
    #journey-view { display: none; padding: 0 0 100px; }
    #journey-hub { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; animation: slideUp 0.4s ease; }
    .hub-card { background: white; border-radius: 24px; padding: 22px 16px; text-align: center; border: 1px solid #D1D5DB; cursor: pointer; transition: all 0.2s; }
    .hub-card:active { transform: scale(0.96); }
    .hub-icon { font-size: 36px; margin-bottom: 8px; display: block; }
    .hub-title { font-size: 13px; font-weight: 800; color: #111827; }

    #journey-path { display: none; padding: 16px; animation: slideUp 0.4s ease; }
    .back-btn { background: #7C3AED; color: white; border: none; padding: 10px 16px; border-radius: 12px; font-weight: 800; margin-bottom: 20px; cursor: pointer; font-size: 13px; }

    .path-container { position: relative; padding: 40px 0; display: flex; flex-direction: column; align-items: center; min-height: 500px; }
    
    /* Hlavní, elegantní lajna */
    .path-line { position: absolute; top: 0; bottom: 0; width: 6px; background: #E5E7EB; border-radius: 3px; z-index: 1; left: 50%; transform: translateX(-50%); }
    
    .path-step { position: relative; z-index: 2; margin-bottom: 60px; /* Větší mezera pro cestičku */ width: 100%; display: flex; justify-content: center; align-items: center; }
    
    /* Klikatý design s "mostem" k lajně */
    .path-step:nth-child(even) { transform: translateX(50px); }
    .path-step:nth-child(odd) { transform: translateX(-50px); }
    .path-step::after { content: ''; position: absolute; height: 4px; background: #E5E7EB; top: 50%; transform: translateY(-50%); z-index: -1; transition: background 0.4s; }
    .path-step:nth-child(even)::after { left: auto; right: 50%; width: 50px; }
    .path-step:nth-child(odd)::after { left: 50%; width: 50px; }
    
    /* Styl hotového mostu */
    .path-step.done::after { background: #86EFAC; }

    .step-node { width: 66px; height: 66px; background: white; border: 5px solid #D1D5DB; border-radius: 50%; display: grid; place-items: center; font-size: 28px; position: relative; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .path-step.done .step-node { border-color: #10B981; background: #ECFDF5; animation: victoryJump 0.6s ease, pulseGold 2s infinite; }
    .path-step.locked .step-node { opacity: 0.4; filter: grayscale(1); }
    
    .step-info { position: absolute; top: 50%; left: 85px; transform: translateY(-50%); width: 150px; text-align: left; pointer-events: none; }
    .path-step:nth-child(even) .step-info { left: auto; right: 85px; text-align: right; }
    .step-info b { display: block; font-size: 12px; color: #111827; }
    .step-info span { font-size: 10px; color: #6B7280; font-weight: 700; margin-top: 1px; }

    /* Cestička mezi body (👣) */
    .path-connector { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: -60px; margin-bottom: 20px; z-index: 1; pointer-events: none; }
    .path-connector span { font-size: 12px; color: #D1D5DB; font-weight: bold; margin-bottom: 5px; opacity: 0.8; }
    .path-connector span:last-child { margin-bottom: 0; }
    .path-connector.done span { color: #86EFAC; }

    /* --- 5. SYSTEM, TABBAR, MODAL (Stejné jako V18) --- */
    #system-view { display: none; padding: 0 16px 100px; }
    .sys-info { background: #EDE9FE; padding: 14px; border-radius: 16px; font-size: 12px; color: #5B21B6; font-weight: 600; margin: 10px 0 20px; text-align: center; border: 1px solid #DDD6FE; line-height: 1.4; }
    .sys-add-btn { width: 100%; padding: 16px; border-radius: 18px; border: 2px dashed #7C3AED; background: #F5F3FF; color: #7C3AED; font-weight: 800; cursor: pointer; }
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); padding: 12px 20px 28px; display: flex; justify-content: space-around; border-top: 1px solid #E5E7EB; z-index: 100; }
    .tab { flex: 1; text-align: center; color: #9CA3AF; cursor: pointer; }
    .tab.active { color: #7C3AED; }
    .tab-icon { font-size: 20px; display: block; margin-bottom: 3px; }
    .tab span { font-size: 9px; font-weight: 800; text-transform: uppercase; }
    .fab { position: fixed; bottom: 90px; right: 20px; width: 60px; height: 60px; background: #7C3AED; border-radius: 50%; display: grid; place-items: center; color: white; font-size: 30px; box-shadow: 0 6px 16px rgba(124,58,237,0.3); z-index: 90; cursor: pointer; }
    .add-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: flex-end; backdrop-filter: blur(4px); }
    .add-modal.open { display: flex; }
    .modal-box { background: white; width: 100%; border-radius: 24px 24px 0 0; padding: 35px 20px 45px; animation: slideUp 0.3s ease; position: relative; }
    .modal-input { width: 100%; padding: 15px; border-radius: 14px; border: 2px solid #E5E7EB; outline: none; margin-bottom: 20px; font-size: 15px; font-weight: 600; }
    .icon-grid { display: flex; gap: 12px; margin-bottom: 25px; overflow-x: auto; padding: 10px 5px; }
    .icon-opt { width: 50px; height: 50px; display: grid; place-items: center; font-size: 26px; background: #F3F4F6; border-radius: 15px; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; padding-top: 4px; }
    .icon-opt.selected { background: #EDE9FE; border-color: #7C3AED; transform: scale(1.1); }
    .prio-selector { display: flex; gap: 8px; margin-bottom: 30px; }
    .prio-btn { flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #E5E7EB; font-size: 12px; font-weight: 800; text-align: center; cursor: pointer; color: #6B7280; }
    .prio-btn[data-prio="high"].selected { background: #FEF2F2; color: #EF4444; border-color: #EF4444; }
    .prio-btn[data-prio="mid"].selected { background: #FFFBEB; color: #F59E0B; border-color: #F59E0B; }
    .prio-btn[data-prio="low"].selected { background: #ECFDF5; color: #10B981; border-color: #10B981; }
    .save-btn { width: 100%; background: #7C3AED; color: white; border: none; border-radius: 16px; padding: 18px; font-size: 15px; font-weight: 800; cursor: pointer; }
  </style>
</head>
<body>

<div class="phone">
  <div id="routine-view">
    <div class="header"><h1>Daily Routine</h1><p class="date-label" id="date-label">April 2026</p><div class="counter-badge" id="main-counter"><span id="counter-text">0</span></div></div>
    <div class="calendar" id="calendar"></div>
    <div class="progress-card">
      <div class="ring-wrap">
        <svg viewBox="0 0 80 80"><circle class="ring-bg" cx="40" cy="40" r="35"/><circle class="ring-fg" id="ring" cx="40" cy="40" r="35" stroke-dasharray="219.9" stroke-dashoffset="219.9"/></svg>
        <div class="ring-pct" id="pct-text">0%</div>
      </div>
      <div class="progress-text"><h2>Tvůj progres</h2><p id="progress-sub">0 z 0 hotovo</p></div>
    </div>
    <div class="tasks" id="task-list"></div>
  </div>

  <div id="journey-view">
    <div class="header"><h1>Skill Trees</h1><p class="date-label">Vyber si svou cestu</p></div>
    <div id="journey-hub"></div>
    <div id="journey-path">
      <button class="back-btn" onclick="closeJourneyDetail()">← Zpět na rozcestí</button>
      <div class="path-container">
        <div class="path-line"></div>
        <div id="path-steps-list" style="width:100%"></div>
      </div>
    </div>
  </div>

  <div id="system-view">
    <div class="header"><h1>Master System</h1><p class="date-label">Ranní spawn (4:00)</p></div>
    <div class="sys-info">Tyto úkoly se každé ráno samy přidají do Routine.</div>
    <div id="template-list" class="tasks"></div>
    <button class="sys-add-btn" onclick="openModal('template')">+ Přidat ranní rituál</button>
  </div>

  <div class="fab" onclick="openModal('task')">+</div>
  <div class="tabbar">
    <div class="tab active" id="tab-routine" onclick="showView('routine')"><span class="tab-icon">🏠</span><span>Routine</span></div>
    <div class="tab" id="tab-journey" onclick="showView('journey')"><span class="tab-icon">🗺️</span><span>Journey</span></div>
    <div class="tab" id="tab-system" onclick="showView('system')"><span class="tab-icon">⚙️</span><span>System</span></div>
  </div>
</div>

<div class="add-modal" id="add-modal"><div class="modal-box"><div style="position:absolute;top:15px;right:15px;color:#AAA;" onclick="closeModal()">✕</div><h3 id="modal-title" style="margin-bottom:15px;font-size:17px;">Nový úkol</h3><input id="task-input" class="modal-input" placeholder="Co tě čeká?" autocomplete="off"><p style="font-size:11px;color:#999;margin-bottom:10px;">Ikona & Kategorie</p><div class="icon-grid" id="icon-picker"></div><p style="font-size:11px;color:#999;margin-bottom:10px;">Priorita</p><div class="prio-selector"><div class="prio-btn" data-prio="low">LOW</div><div class="prio-btn selected" data-prio="mid">MID</div><div class="prio-btn" data-prio="high">HIGH</div></div><button class="save-btn" id="modal-save-btn">Uložit do systému</button></div></div>

<script>
/* --- DATA --- */
let tasks = JSON.parse(localStorage.getItem('mySystemTasks_v19')) || [];
let templates = JSON.parse(localStorage.getItem('myTemplates_v19')) || [
  { name: "Studium Make.com", priority: "high", icon: "💻" },
  { name: "Ledová sprcha", priority: "mid", icon: "💪" }
];
let lastResetDate = localStorage.getItem('lastResetDate_v19') || "";

const icons = ["💪", "💻", "📚", "💧", "🍳", "🧘‍♂️", "💸", "🏃‍♂️", "🎯"];
const milestones = [
  { cat: "💪", title: "Nováček", target: 1 },
  { cat: "💪", title: "Pravidelný dříč", target: 10 },
  { cat: "💪", title: "Bestie", target: 50 },
  { cat: "💻", title: "Hello World", target: 1 },
  { cat: "💻", title: "Automatizátor", target: 20 },
  { cat: "💻", title: "Make God", target: 100 },
  { cat: "📚", title: "Čtenář", target: 5 },
  { cat: "💧", title: "Hydratovaný", target: 14 }
];
const catNames = {"💪":"Fitness","💻":"Developer","📚":"Mindset","💧":"Zdraví","💸":"Money","🎯":"Cíle"};

let selectedDay = new Date().getDate();
let currentIcon = "💪";
let selectedPriority = "mid";
let modalMode = 'task';

/* --- CORE --- */
function save() { localStorage.setItem('mySystemTasks_v19', JSON.stringify(tasks)); localStorage.setItem('myTemplates_v19', JSON.stringify(templates)); }
function checkAutoReset() { const now = new Date(); if (lastResetDate !== now.toDateString() && now.getHours() >= 4) { templates.forEach(t => tasks.push({ id: Date.now()+Math.random(), name:t.name, icon:t.icon, priority:t.priority, done:false, date:now.getDate() })); localStorage.setItem('lastResetDate_v19', now.toDateString()); lastResetDate=now.toDateString(); save(); } }

/* --- RENDERING --- */
function render() {
  // Routine
  const list = document.getElementById("task-list"); list.innerHTML = "";
  const todays = tasks.filter(t => t.date === selectedDay);
  todays.sort((a,b) => a.done - b.done);

  todays.forEach((t, i) => {
    const el = document.createElement("div"); el.className = `task priority-${t.priority} ${t.done?'done':''}`;
    el.style.animationDelay = (i * 0.04) + 's';
    el.innerHTML = `<div class="task-check" onclick="toggleTask(${t.id})"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div style="font-size:22px;">${t.icon}</div><div class="task-info" onclick="toggleTask(${t.id})"><div class="task-tag">${t.priority}</div><div class="task-name">${t.name}</div></div><div onclick="removeTask(${t.id})" style="color:#DDD">✕</div>`;
    list.appendChild(el);
  });

  const doneCount = todays.filter(t => t.done).length;
  const pct = todays.length ? Math.round((doneCount / todays.length) * 100) : 0;
  document.getElementById("pct-text").innerText = pct + "%";
  document.getElementById("ring").style.strokeDashoffset = 219.9 - (pct/100)*219.9;
  document.getElementById("progress-sub").innerText = `${doneCount} z ${todays.length} hotovo`;
  document.getElementById("counter-text").innerText = todays.length - doneCount;

  // System
  const tList = document.getElementById("template-list"); tList.innerHTML = "";
  templates.forEach((t, i) => {
    const el = document.createElement("div"); el.className=`task priority-${t.priority}`;
    el.innerHTML = `<div style="font-size:20px;">${t.icon}</div><div class="task-info"><b>${t.name}</b></div><div onclick="removeTemplate(${i})" style="color:#DDD">✕</div>`;
    tList.appendChild(el);
  });
  renderJourneyHub();
}

function renderJourneyHub() {
  const hub = document.getElementById("journey-hub"); hub.innerHTML = "";
  [...new Set(milestones.map(m => m.cat))].forEach(cat => {
    const card = document.createElement("div"); card.className = "hub-card";
    card.onclick = () => openJourneyPath(cat);
    card.innerHTML = `<span class="hub-icon">${cat}</span><span class="hub-title">${catNames[cat] || 'Skill'}</span>`;
    hub.appendChild(card);
  });
}

function openJourneyPath(cat) {
  document.getElementById("journey-hub").style.display="none"; document.getElementById("journey-path").style.display="block";
  const list = document.getElementById("path-steps-list"); list.innerHTML = "";
  const catMilestones = milestones.filter(m => m.cat === cat);
  const score = tasks.filter(t => t.done && t.icon === cat).length;

  catMilestones.forEach((m, i) => {
    const isDone = score >= m.target;
    // Cestička (👣)
    if (i > 0) {
      const conn = document.createElement("div"); conn.className = `path-connector ${score >= catMilestones[i-1].target && score < m.target ? 'current-pass' : ''} ${isDone?'done':''}`;
      conn.innerHTML = `<span>👣</span><span>👣</span>`;
      list.appendChild(conn);
    }
    // Bod
    const step = document.createElement("div"); step.className = `path-step ${isDone ? 'done' : ''}`;
    step.innerHTML = `<div class="step-node">${isDone?cat:'🔒'}</div><div class="step-info"><b>${m.title}</b><span>${score}/${m.target} hotovo</span></div>`;
    list.appendChild(step);
    if (isDone && !localStorage.getItem('m_a_' + m.title)) {
      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
      localStorage.setItem('m_a_' + m.title, 'true');
    }
  });
}

function closeJourneyDetail() { document.getElementById("journey-hub").style.display="grid"; document.getElementById("journey-path").style.display="none"; }
function showView(v) { ['routine','journey','system'].forEach(id => document.getElementById(id+'-view').style.display = (id===v?'block':'none')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-'+v).classList.add('active'); if(v==='journey') closeJourneyDetail(); }
function buildCalendar() { const cal = document.getElementById("calendar"); cal.innerHTML = ""; const days = ["PO","ÚT","ST","ČT","PÁ","SO","NE"]; const nums = [20,21,22,23,24,25,26]; nums.forEach((n, i) => { const d = document.createElement("div"); d.className = "cal-day" + (n === selectedDay ? " active" : ""); d.innerHTML = `<div class="day-label">${days[i]}</div><div class="day-num">${n}</div>`; d.onclick = () => { selectedDay = n; buildCalendar(); render(); }; cal.appendChild(d); }); document.getElementById("date-label").innerText = `${selectedDay} April 2026`; }
function openModal(mode) { modalMode = mode; document.getElementById("add-modal").classList.add("open"); const picker = document.getElementById("icon-picker"); picker.innerHTML = ""; icons.forEach(icon => { const opt = document.createElement("div"); opt.className = "icon-opt" + (currentIcon === icon ? " selected" : ""); opt.innerText = icon; opt.onclick = () => { currentIcon = icon; openModal(mode); }; picker.appendChild(opt); }); }
function closeModal() { document.getElementById("add-modal").classList.remove("open"); }
document.querySelectorAll(".prio-btn").forEach(btn => { btn.onclick = () => { document.querySelectorAll(".prio-btn").forEach(b => b.classList.remove("selected")); btn.classList.add("selected"); selectedPriority = btn.dataset.prio; }; });
document.getElementById("modal-save-btn").onclick = () => { const val = document.getElementById("task-input").value; if (!val) return; if (modalMode === 'task') tasks.push({ id: Date.now(), name: val, icon: currentIcon, priority: selectedPriority, done: false, date: selectedDay }); else templates.push({ name: val, icon: currentIcon, priority: selectedPriority }); save(); render(); closeModal(); document.getElementById("task-input").value = ""; };
function toggleTask(id) { const t = tasks.find(x => x.id === id); t.done = !t.done; save(); render(); }
function removeTask(id) { tasks = tasks.filter(x => x.id !== id); save(); render(); }
function removeTemplate(i) { templates.splice(i, 1); save(); render(); }
checkAutoReset(); buildCalendar(); render();
</script>
</body>
</html>
