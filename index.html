<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Routine System v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F0EEF8; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .phone { max-width: 450px; width: 100%; margin: 0 auto; padding: 20px 0 32px; min-height: 100vh; position: relative; }
    
    /* Header & Badge */
    .header { text-align: center; padding: 0 20px 12px; position: relative; }
    .counter-badge { position: absolute; right: 20px; top: 4px; background: white; border-radius: 20px; padding: 6px 14px; font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 6px; border: 1px solid #D1D5DB; transition: all 0.4s; }
    .counter-badge.all-done { background: #10B981; color: white; border-color: #10B981; transform: scale(1.1); box-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
    .dot { width: 8px; height: 8px; background: #7C3AED; border-radius: 50%; }
    .all-done .dot { background: white; }

    h1 { font-size: 22px; font-weight: 800; color: #000; }
    .date-label { font-size: 14px; color: #444; margin-top: 2px; }
    
    /* Calendar */
    .calendar { display: flex; justify-content: space-between; padding: 12px 16px; gap: 5px; }
    .cal-day { flex: 1; text-align: center; cursor: pointer; border-radius: 12px; padding: 6px 2px; border: 1px solid #D1D5DB; background: white; }
    .cal-day .day-label { font-size: 10px; color: #555; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .cal-day .day-num { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto; font-size: 14px; font-weight: 700; }
    .cal-day.active { border-color: #7C3AED; background: #EDE9FE; }
    .cal-day.active .day-num { background: #7C3AED; color: white; }

    /* Tasks with Priority Styling */
    .tasks { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 120px; }
    .task { background: white; border-radius: 18px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid #D1D5DB; position: relative; transition: transform 0.2s; }
    .task.priority-high { border-left: 6px solid #EF4444; }
    .task.priority-mid { border-left: 6px solid #F59E0B; }
    .task.priority-low { border-left: 6px solid #10B981; }
    .task.done { opacity: 0.5; transform: scale(0.98); }
    
    .task-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; flex-shrink: 0; }
    .task-info { flex: 1; }
    .task-name { font-size: 15px; font-weight: 700; color: #000; }
    .task-priority-tag { font-size: 10px; font-weight: 800; text-transform: uppercase; opacity: 0.7; }
    
    .delete-btn { padding: 8px; color: #9CA3AF; cursor: pointer; font-size: 14px; }
    .task-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .task-check svg { display: none; width: 14px; height: 14px; stroke: white; stroke-width: 3; fill: none; }
    .task.done .task-check svg { display: block; }

    /* FAB & Tabbar */
    .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; background: #7C3AED; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 12px rgba(124,58,237,0.4); z-index: 50; }
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 20px 24px; display: flex; justify-content: space-around; border-top: 1px solid #E5E7EB; z-index: 40; }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 6px 0; border-radius: 16px; }
    .tab.active { background: #F5F3FF; color: #7C3AED; font-weight: 800; }

    /* Modal Priority Picker */
    .add-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: flex-end; justify-content: center; z-index: 100; backdrop-filter: blur(2px); }
    .add-modal.open { display: flex; }
    .modal-box { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; }
    .modal-box input { width: 100%; font-size: 16px; padding: 14px; border-radius: 14px; border: 1.5px solid #D1D5DB; margin-bottom: 15px; }
    
    .priority-selector { display: flex; gap: 8px; margin-bottom: 20px; }
    .prio-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid #D1D5DB; font-size: 12px; font-weight: 700; text-align: center; cursor: pointer; transition: 0.2s; }
    .prio-btn[data-prio="high"].selected { background: #EF4444; color: white; border-color: #EF4444; }
    .prio-btn[data-prio="mid"].selected { background: #F59E0B; color: white; border-color: #F59E0B; }
    .prio-btn[data-prio="low"].selected { background: #10B981; color: white; border-color: #10B981; }

    .modal-add-btn { width: 100%; background: #7C3AED; color: white; border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 700; }
  </style>
</head>
<body>

<div class="phone">
  <div id="routine-view">
    <div class="header">
      <h1>My Notion System</h1>
      <p class="date-label" id="date-label">22 April</p>
      <div class="counter-badge" id="main-counter">
        <span class="dot"></span>
        <span id="counter-text">0</span>
      </div>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="tasks" id="task-list"></div>
  </div>

  <div class="fab" id="fab">
    <svg viewBox="0 0 24 24" width="28" height="28" stroke="white" fill="none" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </div>
</div>

<div class="add-modal" id="add-modal">
  <div class="modal-box">
    <input id="task-input" placeholder="Co je třeba udělat?" />
    
    <div style="font-size:12px; font-weight:800; margin-bottom:8px; color:#666">PRIORITA (Notion Property)</div>
    <div class="priority-selector">
      <div class="prio-btn" data-prio="low">LOW</div>
      <div class="prio-btn selected" data-prio="mid">MID</div>
      <div class="prio-btn" data-prio="high">HIGH</div>
    </div>
    
    <button class="modal-add-btn" id="modal-add-btn">Vytvořit Task</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('myNotionTasks')) || [];
let selectedDay = 22;
let selectedPriority = "mid";

function save() { localStorage.setItem('myNotionTasks', JSON.stringify(tasks)); }

function render() {
  const list = document.getElementById("task-list"); list.innerHTML = "";
  const todays = tasks.filter(t => t.date === selectedDay);
  
  todays.forEach(t => {
    const el = document.createElement("div"); 
    el.className = `task priority-${t.priority} ${t.done ? 'done' : ''}`;
    el.innerHTML = `
      <div class="task-check" style="border-color:#7C3AED; ${t.done?'background:#7C3AED':''}" onclick="toggle(${t.id}, event)"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="task-info" onclick="toggle(${t.id}, event)">
        <div class="task-priority-tag">${t.priority}</div>
        <div class="task-name">${t.name}</div>
      </div>
      <div class="delete-btn" onclick="removeTask(${t.id}, event)">✕</div>`;
    list.appendChild(el);
  });

  const remaining = todays.filter(t => !t.done).length;
  const badge = document.getElementById('main-counter');
  document.getElementById('counter-text').innerHTML = (todays.length > 0 && remaining === 0) ? '✓' : remaining;
  if (todays.length > 0 && remaining === 0) badge.classList.add('all-done'); else badge.classList.remove('all-done');
}

function toggle(id, e) {
  e.stopPropagation(); const t = tasks.find(x => x.id === id); t.done = !t.done; save(); render();
}

function removeTask(id, e) {
  e.stopPropagation(); tasks = tasks.filter(t => t.id !== id); save(); render();
}

// Modal Logic
document.getElementById("fab").onclick = () => document.getElementById("add-modal").classList.add("open");
document.querySelectorAll(".prio-btn").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll(".prio-btn").forEach(x => x.classList.remove("selected"));
    btn.classList.add("selected");
    selectedPriority = btn.dataset.prio;
  };
});

document.getElementById("modal-add-btn").onclick = () => {
  const val = document.getElementById("task-input").value; if(!val) return;
  tasks.push({ id: Date.now(), name: val, done: false, date: selectedDay, priority: selectedPriority });
  save(); document.getElementById("task-input").value = ""; 
  document.getElementById("add-modal").classList.remove("open"); render();
};

function buildCalendar() {
  const cal = document.getElementById("calendar"); cal.innerHTML = "";
  [21,22,23,24,25].forEach(n => {
    const d = document.createElement("div"); d.className = "cal-day" + (n === selectedDay ? " active" : "");
    d.innerHTML = `<div class="day-label">APR</div><div class="day-num">${n}</div>`;
    d.onclick = () => { selectedDay = n; buildCalendar(); render(); };
    cal.appendChild(d);
  });
}

buildCalendar(); render();
</script>
</body>
</html>
