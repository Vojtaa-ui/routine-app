<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Routine System v5</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F0EEF8; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .phone { max-width: 450px; width: 100%; margin: 0 auto; padding: 20px 0 32px; min-height: 100vh; position: relative; }
    
    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

    .header { text-align: center; padding: 0 20px 12px; position: relative; }
    h1 { font-size: 22px; font-weight: 800; }
    .counter-badge { position: absolute; right: 20px; top: 4px; background: white; border-radius: 20px; padding: 6px 14px; font-size: 15px; font-weight: 800; border: 1px solid #D1D5DB; transition: all 0.4s; }
    .counter-badge.all-done { background: #10B981; color: white; border-color: #10B981; animation: pop 0.4s ease; }

    .calendar { display: flex; justify-content: space-between; padding: 12px 16px; gap: 5px; }
    .cal-day { flex: 1; text-align: center; cursor: pointer; border-radius: 12px; padding: 6px 2px; border: 1px solid #D1D5DB; background: white; }
    .cal-day.active { border-color: #7C3AED; background: #EDE9FE; }
    .cal-day.active .day-num { background: #7C3AED; color: white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; margin: 0 auto; }

    .progress-card { background: white; margin: 10px 16px 20px; border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; border: 1px solid #D1D5DB; animation: slideUp 0.5s ease; }
    .ring-wrap { position: relative; width: 72px; height: 72px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: #DDD6FE; stroke-width: 7; }
    .ring-fg { fill: none; stroke: #7C3AED; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
    .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; }

    .tasks { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 120px; }
    .task { border-radius: 18px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid #D1D5DB; animation: slideUp 0.4s forwards; transition: all 0.3s; }
    .task.priority-high { border-left: 6px solid #EF4444; background: #FEF2F2; }
    .task.priority-mid { border-left: 6px solid #F59E0B; background: #FFFBEB; }
    .task.priority-low { border-left: 6px solid #10B981; background: #ECFDF5; }
    .task.done { opacity: 0.5; transform: scale(0.97); background: #F9FAFB; }

    /* System / Template Manager */
    #system-view { display: none; padding: 20px 16px 120px; }
    .template-card { background: white; padding: 16px; border-radius: 18px; border: 1px solid #D1D5DB; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
    .sys-info { background: #EDE9FE; padding: 12px; border-radius: 14px; font-size: 13px; color: #5B21B6; font-weight: 600; margin-bottom: 20px; text-align: center; }

    /* Journey */
    #journey-view { display: none; padding-bottom: 120px; }
    .timeline-center { position: relative; margin: 20px 16px; padding: 20px 0; }
    .timeline-center::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: #D1D5DB; transform: translateX(-50%); }
    .tc-item { display: flex; align-items: center; margin-bottom: 30px; position: relative; opacity: 0; animation: slideUp 0.4s forwards; }
    .tc-content { width: 42%; background: white; padding: 12px; border-radius: 16px; border: 1px solid #D1D5DB; text-align: center; }
    .tc-dot { width: 24px; height: 24px; background: #F0EEF8; border: 4px solid #D1D5DB; border-radius: 50%; position: absolute; left: 50%; transform: translateX(-50%); }
    .tc-item.done .tc-dot { background: #10B981; border-color: #A7F3D0; }

    .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; background: #7C3AED; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(124,58,237,0.4); z-index: 50; }
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 20px 24px; display: flex; justify-content: space-around; border-top: 1px solid #E5E7EB; z-index: 40; }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: #9CA3AF; transition: 0.2s; }
    .tab.active { color: #7C3AED; }
    .tab span { font-size: 10px; font-weight: 800; }

    .add-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: flex-end; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
    .add-modal.open { display: flex; }
    .modal-box { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; }
    .prio-btn { flex: 1; padding: 12px; border-radius: 14px; border: 2px solid #E5E7EB; text-align: center; font-size: 12px; font-weight: 800; cursor: pointer; }
    .prio-btn.selected[data-prio="high"] { background: #FEF2F2; color: #EF4444; border-color: #EF4444; }
    .prio-btn.selected[data-prio="mid"] { background: #FFFBEB; color: #F59E0B; border-color: #F59E0B; }
    .prio-btn.selected[data-prio="low"] { background: #ECFDF5; color: #10B981; border-color: #10B981; }
  </style>
</head>
<body>

<div class="phone">
  <div id="routine-view">
    <div class="header"><h1>Daily Routine</h1><div class="counter-badge" id="main-counter">● <span id="counter-text">0</span></div></div>
    <div class="calendar" id="calendar"></div>
    <div class="progress-card">
      <div class="ring-wrap"><svg width="72" height="72"><circle class="ring-bg" cx="36" cy="36" r="29"/><circle class="ring-fg" id="ring" cx="36" cy="36" r="29" stroke-dasharray="182.2" stroke-dashoffset="182.2"/></svg><div class="ring-pct" id="pct-text">0%</div></div>
      <div class="progress-text"><h2>Progres</h2><p id="progress-sub">0 z 0 hotovo</p></div>
    </div>
    <div class="tasks" id="task-list"></div>
  </div>

  <div id="journey-view">
    <div style="text-align:center; padding:20px;"><h2>My Journey</h2></div>
    <div class="timeline-center" id="journey-timeline"></div>
  </div>

  <div id="system-view">
    <div style="text-align:center; padding:20px;"><h2>System Settings</h2></div>
    <div class="sys-info">Úkoly níže se automaticky vygenerují každý den ve 4:00 ráno.</div>
    <div id="template-list"></div>
    <button onclick="addTemplate()" style="width:100%; padding:14px; border-radius:14px; border:2px dashed #D1D5DB; background:none; font-weight:700; color:#666;">+ Přidat šablonu rituálu</button>
  </div>

  <div class="fab" id="fab"><svg viewBox="0 0 24 24" width="24" height="24" stroke="white" fill="none" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></div>

  <div class="tabbar">
    <div class="tab active" onclick="showView('routine')"><span>ROUTINE</span></div>
    <div class="tab" onclick="showView('journey')"><span>JOURNEY</span></div>
    <div class="tab" onclick="showView('system')"><span>SYSTEM</span></div>
  </div>
</div>

<div class="add-modal" id="add-modal">
  <div class="modal-box">
    <input id="task-input" placeholder="Co tě čeká?" style="width:100%; padding:14px; border-radius:14px; border:2px solid #DDD; margin-bottom:16px;">
    <div style="display:flex; gap:8px; margin-bottom:20px;">
      <div class="prio-btn" data-prio="low">LOW</div>
      <div class="prio-btn selected" data-prio="mid">MID</div>
      <div class="prio-btn" data-prio="high">HIGH</div>
    </div>
    <button id="modal-add-btn" style="width:100%; background:#7C3AED; color:white; padding:16px; border:none; border-radius:16px; font-weight:800;">Vytvořit</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('mySystemTasks')) || [];
let templates = JSON.parse(localStorage.getItem('myDailyTemplates')) || [
  { name: "Ranní meditace", priority: "high", icon: "🧘‍♂️" },
  { name: "Pít 0.5l vody", priority: "mid", icon: "💧" }
];
let lastReset = localStorage.getItem('lastResetDate') || "";
let selectedDay = new Date().getDate();

// SYSTEM LOGIC: Auto-spawn ve 4:00
function checkAutoReset() {
  const now = new Date();
  const todayStr = now.toDateString();
  const hour = now.getHours();

  if (lastReset !== todayStr && hour >= 4) {
    templates.forEach(temp => {
      tasks.push({ id: Date.now() + Math.random(), name: temp.name, done: false, date: now.getDate(), priority: temp.priority, icon: temp.icon });
    });
    localStorage.setItem('lastResetDate', todayStr);
    lastReset = todayStr;
    save(); render();
  }
}

function save() { 
  localStorage.setItem('mySystemTasks', JSON.stringify(tasks));
  localStorage.setItem('myDailyTemplates', JSON.stringify(templates));
}

function render() {
  const list = document.getElementById("task-list"); list.innerHTML = "";
  const journey = document.getElementById("journey-timeline"); journey.innerHTML = "";
  const tempDom = document.getElementById("template-list"); tempDom.innerHTML = "";
  
  let todays = tasks.filter(t => t.date === selectedDay);
  const prioWeight = { 'high': 1, 'mid': 2, 'low': 3 };
  todays.sort((a, b) => a.done - b.done || prioWeight[a.priority] - prioWeight[b.priority]);
  
  todays.forEach(t => {
    const el = document.createElement("div"); el.className = `task priority-${t.priority} ${t.done?'done':''}`;
    el.innerHTML = `<div class="task-icon">${t.icon}</div><div style="flex:1" onclick="toggle(${t.id})"><b>${t.name}</b></div><div onclick="removeTask(${t.id})">✕</div>`;
    list.appendChild(el);
    const jel = document.createElement("div"); jel.className = "tc-item" + (t.done?" done":"");
    jel.innerHTML = `<div class="tc-content">${t.icon} ${t.name}</div><div class="tc-dot"></div><div style="width:42%"></div>`;
    journey.appendChild(jel);
  });

  templates.forEach((temp, i) => {
    const tel = document.createElement("div"); tel.className = "template-card";
    tel.innerHTML = `<span>${temp.icon}</span><b style="flex:1">${temp.name}</b><span style="font-size:10px; opacity:0.5">${temp.priority}</span><div onclick="removeTemplate(${i})">✕</div>`;
    tempDom.appendChild(tel);
  });

  const done = todays.filter(t => t.done).length;
  document.getElementById("ring").style.strokeDashoffset = 182.2 - (done/(todays.length||1))*182.2;
  document.getElementById("pct-text").innerText = Math.round((done/(todays.length||1))*100) + "%";
  document.getElementById("progress-sub").innerText = `${done} z ${todays.length} hotovo`;
}

function toggle(id) { const t = tasks.find(x => x.id === id); t.done = !t.done; save(); render(); }
function removeTask(id) { tasks = tasks.filter(x => x.id !== id); save(); render(); }
function removeTemplate(i) { templates.splice(i, 1); save(); render(); }
function addTemplate() {
  const name = prompt("Název rituálu:");
  if(name) { templates.push({ name, priority: "mid", icon: "✨" }); save(); render(); }
}

function showView(v) {
  ['routine', 'journey', 'system'].forEach(id => document.getElementById(id+'-view').style.display = (id===v?'block':'none'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.currentTarget.classList.add('active');
}

document.getElementById("fab").onclick = () => document.getElementById("add-modal").classList.add("open");
document.getElementById("modal-add-btn").onclick = () => {
  const val = document.getElementById("task-input").value;
  tasks.push({ id: Date.now(), name: val, done: false, date: selectedDay, priority: "mid", icon: "🚀" });
  save(); document.getElementById("add-modal").classList.remove("open"); render();
};

checkAutoReset();
render();
</script>
</body>
</html>
