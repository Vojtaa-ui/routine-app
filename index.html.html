<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Today Routine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F0EEF8; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
    .phone { max-width: 450px; width: 100%; margin: 0 auto; padding: 20px 0 32px; min-height: 100vh; position: relative; }
    
    /* Header & Interactive Counter */
    .header { text-align: center; padding: 0 20px 12px; position: relative; }
    .counter-badge { 
      position: absolute; right: 20px; top: 4px; 
      background: white; border-radius: 20px; padding: 6px 14px; 
      font-size: 15px; font-weight: 800; display: flex; align-items: center; gap: 6px; 
      color: #000; border: 1px solid #D1D5DB;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .counter-badge.all-done {
      background: #10B981; color: white; border-color: #10B981; transform: scale(1.1);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
    }
    .dot { width: 8px; height: 8px; background: #7C3AED; border-radius: 50%; transition: all 0.3s; }
    .all-done .dot { background: white; transform: scale(1.2); }

    h1 { font-size: 22px; font-weight: 800; color: #000; }
    .date-label { font-size: 14px; color: #444; margin-top: 2px; font-weight: 500; }
    
    /* Calendar */
    .calendar { display: flex; justify-content: space-between; padding: 12px 16px; gap: 5px; }
    .cal-day { flex: 1; text-align: center; cursor: pointer; border-radius: 12px; padding: 6px 2px; border: 1px solid #D1D5DB; background: white; }
    .cal-day .day-label { font-size: 10px; color: #555; font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .cal-day .day-num { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto; font-size: 14px; font-weight: 700; }
    .cal-day.active { border-color: #7C3AED; background: #EDE9FE; }
    .cal-day.active .day-num { background: #7C3AED; color: white; }

    /* Progress */
    .progress-card { background: white; margin: 10px 16px; border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; border: 1px solid #D1D5DB; }
    .ring-wrap { position: relative; width: 72px; height: 72px; }
    .ring-wrap svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: #DDD6FE; stroke-width: 7; }
    .ring-fg { fill: none; stroke: #7C3AED; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
    .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; }

    /* Tasks with Delete Button */
    .section-title { font-size: 17px; font-weight: 800; color: #000; padding: 14px 20px 8px; }
    .tasks { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 120px; }
    .task { background: white; border-radius: 18px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; border: 1px solid #D1D5DB; position: relative; }
    .task.done { opacity: 0.6; }
    .task-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; }
    .task-info { flex: 1; }
    .task-name { font-size: 15px; font-weight: 700; }
    .delete-btn { padding: 8px; color: #9CA3AF; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .task-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .task-check svg { display: none; width: 14px; height: 14px; stroke: white; stroke-width: 3; fill: none; }
    .task.done .task-check svg { display: block; }

    /* Views & Navigation */
    #journey-view { display: none; padding-bottom: 120px; }
    .timeline { display: flex; flex-direction: column-reverse; padding: 20px; gap: 30px; position: relative; }
    .timeline::before { content: ''; position: absolute; left: 43px; top: 40px; bottom: 40px; width: 3px; background: #D1D5DB; }
    .timeline-item { display: flex; gap: 20px; align-items: center; position: relative; z-index: 2; }
    .timeline-dot { width: 24px; height: 24px; border-radius: 50%; border: 4px solid white; background: #D1D5DB; box-shadow: 0 0 0 2px #D1D5DB; }
    .timeline-item.done .timeline-dot { background: #7C3AED; box-shadow: 0 0 0 2px #7C3AED; }
    .timeline-content { background: white; padding: 14px 20px; border-radius: 16px; border: 1px solid #D1D5DB; flex: 1; font-weight: 700; }

    .fab { position: fixed; bottom: 100px; right: 20px; width: 56px; height: 56px; background: #7C3AED; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 999; box-shadow: 0 4px 12px rgba(124,58,237,0.4); }
    .tabbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 12px 20px 24px; display: flex; justify-content: space-around; border-top: 1px solid #E5E7EB; z-index: 40; }
    .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #666; font-size: 11px; font-weight: 700; cursor: pointer; }
    .tab.active { color: #7C3AED; background: #F5F3FF; border-radius: 16px; padding: 6px 0; }

    /* Modal */
    .add-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: flex-end; z-index: 1000; backdrop-filter: blur(2px); }
    .add-modal.open { display: flex; }
    .modal-box { background: white; border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; }
    .modal-box input { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid #D1D5DB; margin-bottom: 20px; font-size: 16px; }
    .icon-grid { display: flex; gap: 10px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; }
    .icon-opt { width: 40px; height: 40px; background: #F3F4F6; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 2px solid transparent; }
    .icon-opt.selected { border-color: #7C3AED; background: #EDE9FE; }
    .color-opt { width: 36px; height: 36px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 0 1px #D1D5DB; }
    .color-opt.selected { box-shadow: 0 0 0 2px #000; transform: scale(1.1); }
    .modal-add-btn { width: 100%; background: #7C3AED; color: white; border: none; border-radius: 16px; padding: 16px; font-size: 16px; font-weight: 700; }
  </style>
</head>
<body>

<div class="phone">
  <div id="routine-view">
    <div class="header">
      <h1>Today Routine</h1>
      <p class="date-label" id="date-label">19 April</p>
      <div class="counter-badge" id="main-counter">
        <span class="dot"></span>
        <span id="counter-text">0</span>
      </div>
    </div>
    <div class="calendar" id="calendar"></div>
    <div class="progress-card">
      <div class="ring-wrap">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-bg" cx="36" cy="36" r="29"/>
          <circle class="ring-fg" id="ring" cx="36" cy="36" r="29" stroke-dasharray="182.2" stroke-dashoffset="182.2"/>
        </svg>
        <div class="ring-pct" id="pct-text">0%</div>
      </div>
      <div class="progress-text">
        <h2>Daily progress</h2>
        <p id="progress-sub">0 of 0 tasks</p>
      </div>
    </div>
    <div class="section-title">My Tasks</div>
    <div class="tasks" id="task-list"></div>
  </div>

  <div id="journey-view">
    <div style="text-align:center; padding: 20px;"><h2>My Journey</h2></div>
    <div class="timeline" id="journey-timeline"></div>
  </div>

  <div class="fab" id="fab">
    <svg viewBox="0 0 24 24" width="28" height="28" stroke="white" fill="none" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
  </div>

  <div class="tabbar">
    <div class="tab active" id="tab-routine"><span>Routine</span></div>
    <div class="tab" id="tab-journey"><span>Journey</span></div>
  </div>
</div>

<div class="add-modal" id="add-modal">
  <div class="modal-box">
    <div class="modal-title" style="text-align:center; font-weight:800; margin-bottom:15px;">Nový úkol</div>
    <input id="task-input" placeholder="Co tě čeká?" />
    <div class="icon-grid" id="icon-picker">
      <div class="icon-opt selected" data-icon="💪">💪</div>
      <div class="icon-opt" data-icon="🏃‍♂️">🏃‍♂️</div>
      <div class="icon-opt" data-icon="💧">💧</div>
      <div class="icon-opt" data-icon="📚">📚</div>
      <div class="icon-opt" data-icon="🍳">🍳</div>
    </div>
    <div class="color-grid" style="display:flex; gap:10px; margin-bottom:20px;">
      <div class="color-opt selected" data-color="#7C3AED" style="background:#7C3AED"></div>
      <div class="color-opt" data-color="#EF4444" style="background:#EF4444"></div>
      <div class="color-opt" data-color="#10B981" style="background:#10B981"></div>
      <div class="color-opt" data-color="#3B82F6" style="background:#3B82F6"></div>
    </div>
    <button class="modal-add-btn" id="modal-add-btn">Přidat úkol</button>
  </div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem('myRoutineTasks')) || [];
const CIRC = 2 * Math.PI * 29;
let selectedDay = 19;
let currentIcon = "💪", currentColor = "#7C3AED";

function save() { localStorage.setItem('myRoutineTasks', JSON.stringify(tasks)); }

function updateHeaderCounter() {
  const badge = document.getElementById('main-counter');
  const text = document.getElementById('counter-text');
  const todaysTasks = tasks.filter(t => t.date === selectedDay);
  const remaining = todaysTasks.filter(t => !t.done).length;
  
  if (todaysTasks.length > 0 && remaining === 0) {
    badge.classList.add('all-done');
    text.innerHTML = '✓';
  } else {
    badge.classList.remove('all-done');
    text.innerHTML = remaining;
  }
}

function buildCalendar() {
  const days = ["PÁ","SO","NE","PO","ÚT","ST","ČT"], nums = [17,18,19,20,21,22,23];
  const cal = document.getElementById("calendar"); cal.innerHTML = "";
  nums.forEach((n, i) => {
    const d = document.createElement("div"); d.className = "cal-day" + (n === selectedDay ? " active" : "");
    d.innerHTML = `<div class="day-label">${days[i]}</div><div class="day-num">${n}</div>`;
    d.onclick = () => { selectedDay = n; document.getElementById("date-label").textContent = `${n} April`; buildCalendar(); render(); };
    cal.appendChild(d);
  });
}

function render() {
  const list = document.getElementById("task-list"); list.innerHTML = "";
  const journey = document.getElementById("journey-timeline"); journey.innerHTML = "";
  const todays = tasks.filter(t => t.date === selectedDay);
  
  todays.forEach(t => {
    // Task List Item
    const el = document.createElement("div"); el.className = "task" + (t.done ? " done" : "");
    el.innerHTML = `
      <div class="task-check" style="border-color:${t.color}; ${t.done?`background:${t.color}`:''}" onclick="toggle(${t.id}, event)"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="task-info" onclick="toggle(${t.id}, event)">
        <div class="task-name" style="color:${t.done?'#999':'#000'}">${t.icon} ${t.name}</div>
      </div>
      <div class="delete-btn" onclick="removeTask(${t.id}, event)">✕</div>`;
    list.appendChild(el);

    // Journey Item
    const jel = document.createElement("div"); jel.className = "timeline-item" + (t.done ? " done" : "");
    jel.innerHTML = `<div class="timeline-dot"></div><div class="timeline-content">${t.icon} ${t.name}</div>`;
    journey.appendChild(jel);
  });

  const done = todays.filter(t => t.done).length, total = todays.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("ring").style.strokeDashoffset = CIRC - (pct/100)*CIRC;
  document.getElementById("pct-text").textContent = pct + "%";
  document.getElementById("progress-sub").textContent = `${done} z ${total} hotovo`;
  updateHeaderCounter();
}

function toggle(id, e) {
  e.stopPropagation();
  const t = tasks.find(x => x.id === id);
  t.done = !t.done; save(); render();
}

function removeTask(id, e) {
  e.stopPropagation();
  tasks = tasks.filter(t => t.id !== id); save(); render();
}

// Modal logic
document.getElementById("fab").onclick = () => document.getElementById("add-modal").classList.add("open");
document.getElementById("add-modal").onclick = e => { if(e.target.id === "add-modal") e.target.classList.remove("open"); };
document.querySelectorAll(".icon-opt").forEach(b => b.onclick = e => {
  document.querySelectorAll(".icon-opt").forEach(x => x.classList.remove("selected"));
  e.currentTarget.classList.add("selected"); currentIcon = e.currentTarget.dataset.icon;
});
document.querySelectorAll(".color-opt").forEach(b => b.onclick = e => {
  document.querySelectorAll(".color-opt").forEach(x => x.classList.remove("selected"));
  e.currentTarget.classList.add("selected"); currentColor = e.currentTarget.dataset.color;
});
document.getElementById("modal-add-btn").onclick = () => {
  const val = document.getElementById("task-input").value; if(!val) return;
  tasks.push({ id: Date.now(), name: val, done: false, date: selectedDay, color: currentColor, icon: currentIcon });
  save(); document.getElementById("task-input").value = ""; document.getElementById("add-modal").classList.remove("open"); render();
};

document.getElementById("tab-routine").onclick = () => {
  document.getElementById("routine-view").style.display="block"; document.getElementById("journey-view").style.display="none";
  document.getElementById("tab-routine").classList.add("active"); document.getElementById("tab-journey").classList.remove("active");
};
document.getElementById("tab-journey").onclick = () => {
  document.getElementById("routine-view").style.display="none"; document.getElementById("journey-view").style.display="block";
  document.getElementById("tab-routine").classList.remove("active"); document.getElementById("tab-journey").classList.add("active");
};

buildCalendar(); render();
</script>
</body>
</html>
