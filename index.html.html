
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .phone { background: #F0EEF8; max-width: 380px; margin: 0 auto; padding: 20px 0 32px; min-height: 700px; font-family: -apple-system, sans-serif; }
  .header { text-align: center; padding: 0 20px 12px; position: relative; }
  .streak { position: absolute; right: 20px; top: 4px; background: white; border-radius: 20px; padding: 6px 14px; font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 5px; color: #000; border: 1px solid #D1D5DB; }
  h1 { font-size: 22px; font-weight: 800; color: #000; }
  .date-label { font-size: 14px; color: #444; margin-top: 2px; font-weight: 500; }
  .calendar { display: flex; justify-content: space-between; padding: 12px 16px; gap: 5px; }
  .cal-day { flex: 1; text-align: center; cursor: pointer; border-radius: 12px; padding: 6px 2px; border: 1px solid #D1D5DB; background: white; transition: all 0.15s; }
  .cal-day .day-label { font-size: 10px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .cal-day .day-num { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; margin: 0 auto; font-size: 14px; font-weight: 700; color: #000; transition: all 0.15s; }
  .cal-day.active { border-color: #7C3AED; background: #EDE9FE; }
  .cal-day.active .day-num { background: #7C3AED; color: white; }
  .cal-day.active .day-label { color: #5B21B6; }
  .cal-day:hover:not(.active) { border-color: #A78BFA; background: #F5F3FF; }
  .progress-card { background: white; margin: 10px 16px; border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; border: 1px solid #D1D5DB; }
  .ring-wrap { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: #DDD6FE; stroke-width: 7; }
  .ring-fg { fill: none; stroke: #7C3AED; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset 0.6s cubic-bezier(.4,0,.2,1); }
  .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #000; }
  .progress-text h2 { font-size: 16px; font-weight: 800; color: #000; }
  .progress-text p { font-size: 13px; color: #555; margin-top: 3px; font-weight: 500; }
  .section-title { font-size: 17px; font-weight: 800; color: #000; padding: 14px 20px 8px; }
  .tasks { padding: 0 16px; display: flex; flex-direction: column; gap: 10px; }
  .task { background: #EDE9FF; border-radius: 18px; padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.2s; border: 1px solid #C4B5FD; }
  .task.done { background: #D1FAE5; border-color: #6EE7B7; }
  .task-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(124,58,237,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
  .task.done .task-icon { background: rgba(16,185,129,0.2); }
  .task-icon svg { width: 20px; height: 20px; }
  .task-info { flex: 1; }
  .task-time { font-size: 11px; color: #5B21B6; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
  .task.done .task-time { color: #047857; }
  .task-name { font-size: 15px; font-weight: 700; color: #000; margin-top: 2px; }
  .task-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #7C3AED; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .task.done .task-check { background: #10B981; border-color: #10B981; }
  .fab { position: fixed; bottom: 90px; right: calc(50% - 190px + 12px); width: 52px; height: 52px; background: #7C3AED; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.15s; }
  .fab:active { transform: scale(0.93); }
  .fab svg { width: 24px; height: 24px; stroke: white; fill: none; stroke-width: 2.5; }
  .tabbar { background: white; border-radius: 24px; margin: 16px 16px 0; padding: 10px 8px; display: flex; justify-content: space-around; border: 1px solid #D1D5DB; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 0; border-radius: 16px; transition: background 0.15s; }
  .tab.active { background: #F5F3FF; }
  .tab svg { width: 22px; height: 22px; }
  .tab span { font-size: 11px; font-weight: 700; color: #666; }
  .tab.active span { color: #000; }
  .add-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); align-items: flex-end; justify-content: center; z-index: 100; }
  .add-modal.open { display: flex; }
  .modal-box { background: white; border-radius: 24px 24px 0 0; padding: 20px; width: 100%; max-width: 380px; }
  .modal-box input { width: 100%; font-size: 15px; padding: 10px 14px; border-radius: 12px; border: 1.5px solid #D1D5DB; outline: none; margin: 10px 0; color: #000; font-weight: 500; }
  .modal-box input:focus { border-color: #7C3AED; }
  .modal-add-btn { width: 100%; background: #7C3AED; color: white; border: none; border-radius: 14px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .modal-title { font-size: 16px; font-weight: 800; color: #000; margin-bottom: 4px; }
</style>

<div class="phone">
  <div class="header">
    <h1>Today Routine</h1>
    <p class="date-label" id="date-label">19 April</p>
    <div class="streak"><span id="streak-num">1</span><span style="color:#7C3AED;font-size:16px;">&#9679;</span></div>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="progress-card">
    <div class="ring-wrap">
      <svg width="72" height="72" viewBox="0 0 72 72">
        <circle class="ring-bg" cx="36" cy="36" r="29"/>
        <circle class="ring-fg" id="ring" cx="36" cy="36" r="29" stroke-dasharray="182.2" stroke-dashoffset="182.2"/>
      </svg>
      <div class="ring-pct" id="pct-text">0%</div>
    </div>
    <div class="progress-text">
      <h2>Daily progress</h2>
      <p id="progress-sub">0 of 1 tasks completed</p>
    </div>
  </div>

  <div class="section-title">My Tasks</div>
  <div class="tasks" id="task-list"></div>

  <div class="fab" id="fab">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </div>

  <div style="margin-top: 60px;"></div>
  <div class="tabbar">
    <div class="tab active">
      <svg viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span>Routine</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
      <span>Journey</span>
    </div>
    <div class="tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Tests</span>
    </div>
  </div>
</div>

<div class="add-modal" id="add-modal">
  <div class="modal-box">
    <div class="modal-title">New Task</div>
    <input id="task-input" placeholder="Název úkolu, např. 10 kliků..." />
    <button class="modal-add-btn" id="modal-add-btn">Přidat úkol</button>
  </div>
</div>

<script>
const tasks = [{ id: 1, name: "10 kliků", time: "Anytime", done: false }];
const CIRC = 2 * Math.PI * 29;
let selectedDay = 19;

function buildCalendar() {
  const days = ["PÁ","SO","NE","PO","ÚT","ST","ČT"];
  const nums = [17,18,19,20,21,22,23];
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";
  nums.forEach((n, i) => {
    const d = document.createElement("div");
    d.className = "cal-day" + (n === selectedDay ? " active" : "");
    d.innerHTML = `<div class="day-label">${days[i]}</div><div class="day-num">${n}</div>`;
    d.addEventListener("click", () => { selectedDay = n; buildCalendar(); });
    cal.appendChild(d);
  });
}

function renderTasks() {
  const list = document.getElementById("task-list");
  list.innerHTML = "";
  tasks.forEach(t => {
    const el = document.createElement("div");
    el.className = "task" + (t.done ? " done" : "");
    el.innerHTML = `
      <div class="task-icon">
        ${t.done
          ? `<svg viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
          : `<svg viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/></svg>`}
      </div>
      <div class="task-info">
        <div class="task-time">${t.time}</div>
        <div class="task-name">${t.name}</div>
      </div>
      <div class="task-check">
        ${t.done ? `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>` : ""}
      </div>`;
    el.addEventListener("click", () => { t.done = !t.done; updateProgress(); renderTasks(); });
    list.appendChild(el);
  });
}

function updateProgress() {
  const done = tasks.filter(t => t.done).length;
  const total = tasks.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("ring").style.strokeDashoffset = CIRC - (pct / 100) * CIRC;
  document.getElementById("pct-text").textContent = pct + "%";
  document.getElementById("progress-sub").textContent = done + " of " + total + " task" + (total !== 1 ? "s" : "") + " completed";
  document.getElementById("streak-num").textContent = Math.max(done, 1);
}

document.getElementById("fab").addEventListener("click", () => {
  document.getElementById("add-modal").classList.add("open");
  setTimeout(() => document.getElementById("task-input").focus(), 100);
});
document.getElementById("add-modal").addEventListener("click", e => {
  if (e.target === document.getElementById("add-modal")) document.getElementById("add-modal").classList.remove("open");
});
document.getElementById("modal-add-btn").addEventListener("click", () => {
  const val = document.getElementById("task-input").value.trim();
  if (!val) return;
  tasks.push({ id: Date.now(), name: val, time: "Anytime", done: false });
  document.getElementById("task-input").value = "";
  document.getElementById("add-modal").classList.remove("open");
  updateProgress(); renderTasks();
});

buildCalendar();
renderTasks();
updateProgress();
</script>
